version: "3.9"

services:
  simulator:
    image: mars-iot-simulator:multiarch_v1
    container_name: mars-simulator
    ports:
      - "8080:8080"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  ingestion-service:
    build:
      context: ./ingestion-service
    container_name: ingestion-service
    environment:
      SIMULATOR_BASE_URL: http://simulator:8080
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      POLL_INTERVAL_SECONDS: 5
    depends_on:
      - simulator
      - rabbitmq
    ports:
      - "8001:8000"

  engine-service:
    build:
      context: ./engine-service
    container_name: engine-service
    environment:
      SIMULATOR_BASE_URL: http://simulator:8080
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_PATH: /data/rules.db
    volumes:
      - engine_data:/data
    depends_on:
      - simulator
      - rabbitmq
    ports:
      - "8002:8000"

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8002
    depends_on:
      - engine-service
    ports:
      - "3000:3000"

volumes:
  engine_data: