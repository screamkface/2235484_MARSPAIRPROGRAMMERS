<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #7a0019; }
      .w { fill: #ffffff; stroke: #7a0019; stroke-width: 3; rx: 16; ry: 16; }
      .h { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1f1f1f; }
      .p { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #2f2f2f; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8f9fb"/>
  <text x="70" y="80" class="title">Dashboard Modules (Single-Page UI)</text>

  <rect x="80" y="130" width="1440" height="110" class="w"/>
  <text x="120" y="190" class="h">Header: Mission title, Martian clock, link status</text>

  <rect x="80" y="280" width="450" height="260" class="w"/>
  <text x="110" y="335" class="h">REST Sensors</text>
  <text x="110" y="370" class="p">8 sensors with value + timestamp</text>
  <text x="110" y="400" class="p">Realtime updates from WebSocket</text>

  <rect x="575" y="280" width="450" height="260" class="w"/>
  <text x="605" y="335" class="h">Telemetry Widget</text>
  <text x="605" y="370" class="p">Power/Solar simulated line chart</text>
  <text x="605" y="400" class="p">Radiation + Life Support indicators</text>

  <rect x="1070" y="280" width="450" height="260" class="w"/>
  <text x="1100" y="335" class="h">Actuators</text>
  <text x="1100" y="370" class="p">ON/OFF toggles for 4 actuators</text>
  <text x="1100" y="400" class="p">Manual commands via backend API</text>

  <rect x="80" y="580" width="700" height="240" class="w"/>
  <text x="110" y="640" class="h">Hologram / Mission Visualization</text>
  <text x="110" y="675" class="p">Center visual element for operations context</text>

  <rect x="820" y="580" width="700" height="240" class="w"/>
  <text x="850" y="640" class="h">Rule Management</text>
  <text x="850" y="675" class="p">Create, edit, enable/disable, delete rules</text>
  <text x="850" y="705" class="p">Terminal-like active rule view</text>
</svg>
