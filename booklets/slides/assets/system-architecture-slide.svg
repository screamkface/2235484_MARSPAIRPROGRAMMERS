<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #7a0019; }
      .box { fill: #ffffff; stroke: #7a0019; stroke-width: 3; rx: 18; ry: 18; }
      .db { fill: #fff7f9; stroke: #7a0019; stroke-width: 3; rx: 18; ry: 18; }
      .h { font: 700 25px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .p { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .edge { stroke: #0f172a; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .elabel { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .foot { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 11,4 0,8" fill="#0f172a" />
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc" />
  <text x="70" y="78" class="title">System Architecture (From architecture.md)</text>

  <!-- Components -->
  <rect x="70" y="280" width="300" height="180" class="box" />
  <text x="110" y="345" class="h">Simulator</text>
  <text x="110" y="380" class="p">REST Sensors + Actuators</text>

  <rect x="430" y="130" width="340" height="220" class="box" />
  <text x="470" y="200" class="h">Ingestion Service</text>
  <text x="470" y="235" class="p">FastAPI</text>

  <rect x="830" y="190" width="250" height="130" class="db" />
  <text x="875" y="245" class="h">RabbitMQ</text>
  <text x="885" y="280" class="p">mars.events</text>

  <rect x="1140" y="120" width="390" height="240" class="box" />
  <text x="1180" y="190" class="h">Engine Service</text>
  <text x="1180" y="225" class="p">FastAPI + Rule Engine</text>

  <rect x="1210" y="460" width="250" height="130" class="db" />
  <text x="1280" y="515" class="h">SQLite</text>
  <text x="1270" y="550" class="p">rules.db</text>

  <rect x="560" y="520" width="500" height="210" class="box" />
  <text x="610" y="595" class="h">Frontend</text>
  <text x="610" y="630" class="p">React + Vite</text>

  <!-- Flows -->
  <path d="M430 225 C360 245, 330 290, 300 320" class="edge" />
  <text x="290" y="235" class="elabel">Poll REST sensors</text>

  <path d="M770 245 C790 245, 805 245, 830 245" class="edge" />
  <text x="630" y="220" class="elabel">Publish UnifiedEvent (sensor.reading)</text>

  <path d="M1080 250 C1100 250, 1115 250, 1140 250" class="edge" />
  <text x="1060" y="220" class="elabel">Consume events</text>

  <path d="M1320 360 C1320 400, 1320 420, 1320 460" class="edge" />
  <text x="1145" y="410" class="elabel">Persist / Read rules</text>

  <path d="M1140 300 C980 365, 690 410, 370 355" class="edge" />
  <text x="760" y="430" class="elabel">REST actuator commands</text>

  <path d="M1060 610 C1100 560, 1130 470, 1160 350" class="edge" />
  <text x="1090" y="585" class="elabel">REST APIs (state/rules/actuators)</text>

  <path d="M1145 335 C1100 420, 1010 500, 930 555" class="edge" />
  <text x="980" y="470" class="elabel">WebSocket updates</text>

  <text x="70" y="848" class="foot">
    Separation of concerns: ingestion, processing, presentation. Broker-based asynchronous decoupling.
  </text>
</svg>
