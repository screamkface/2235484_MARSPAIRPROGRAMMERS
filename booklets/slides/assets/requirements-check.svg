<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #7a0019; }
      .head { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1f1f1f; }
      .txt { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #2f2f2f; }
      .ok { fill: #ecfdf3; stroke: #16a34a; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8f9fb"/>
  <text x="70" y="80" class="title">Baseline Requirements Coverage</text>

  <rect x="80" y="130" width="1020" height="70" class="box"/>
  <rect x="1100" y="130" width="420" height="70" class="box"/>
  <text x="110" y="175" class="head">Requirement</text>
  <text x="1130" y="175" class="head">Status</text>

  <rect x="80" y="200" width="1020" height="85" class="box"/>
  <rect x="1100" y="200" width="420" height="85" class="ok"/>
  <text x="110" y="252" class="txt">Event-driven architecture with broker</text>
  <text x="1230" y="252" class="head">OK</text>

  <rect x="80" y="285" width="1020" height="85" class="box"/>
  <rect x="1100" y="285" width="420" height="85" class="ok"/>
  <text x="110" y="337" class="txt">Unified event schema</text>
  <text x="1230" y="337" class="head">OK</text>

  <rect x="80" y="370" width="1020" height="85" class="box"/>
  <rect x="1100" y="370" width="420" height="85" class="ok"/>
  <text x="110" y="422" class="txt">Latest in-memory sensor state</text>
  <text x="1230" y="422" class="head">OK</text>

  <rect x="80" y="455" width="1020" height="85" class="box"/>
  <rect x="1100" y="455" width="420" height="85" class="ok"/>
  <text x="110" y="507" class="txt">Persistent automation rules</text>
  <text x="1230" y="507" class="head">OK</text>

  <rect x="80" y="540" width="1020" height="85" class="box"/>
  <rect x="1100" y="540" width="420" height="85" class="ok"/>
  <text x="110" y="592" class="txt">Real-time dashboard (WebSocket)</text>
  <text x="1230" y="592" class="head">OK</text>

  <rect x="80" y="625" width="1020" height="85" class="box"/>
  <rect x="1100" y="625" width="420" height="85" class="ok"/>
  <text x="110" y="677" class="txt">Docker reproducibility (`docker compose up`)</text>
  <text x="1230" y="677" class="head">OK</text>

  <rect x="80" y="740" width="1440" height="90" class="box"/>
  <text x="110" y="795" class="txt">Team-of-2 scope note: telemetry stream ingestion intentionally omitted (allowed by assignment).</text>
</svg>
